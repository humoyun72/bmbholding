global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'integrity-bot'

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  # Backend FastAPI metrics (prometheus-fastapi-instrumentator bilan)
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/api/metrics'
    scrape_interval: 30s

  # PostgreSQL metrics (postgres_exporter bilan — ixtiyoriy)
  - job_name: 'postgres'
    static_configs:
      - targets: ['db:5432']
    scrape_interval: 60s

  # Redis metrics (redis_exporter bilan — ixtiyoriy)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s

  # Prometheus o'zi
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

