name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ══════════════════════════════════════════════════════════════════════════════
#  GitHub Secrets (Settings → Secrets and variables → Actions):
#
#  FTP_HOST         = ftp.bmb-holding.uz
#  FTP_USERNAME     = tgbot@bmb-holding.uz
#  FTP_PASSWORD     = tgbot@123
#  FTP_FRONTEND_DIR = /bmbholding/murojaat/          ← murojaat.bmb-holding.uz papkasi
#  FTP_BACKEND_DIR  = /bmbholding/apimurojaat/        ← apimurojaat.bmb-holding.uz Python app
#
#  VITE_API_URL     = https://apimurojaat.bmb-holding.uz/api
#  WEBHOOK_URL      = https://apimurojaat.bmb-holding.uz/api/telegram/webhook
#  WEBHOOK_SECRET   = .env dagi WEBHOOK_SECRET qiymati
#  TELEGRAM_BOT_TOKEN = BotFather dan olingan token
#  ADMIN_CHAT_ID    = Telegram guruh ID (-100...)
# ══════════════════════════════════════════════════════════════════════════════

jobs:
  # ─── Test Backend ─────────────────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpassword@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          TELEGRAM_BOT_TOKEN: fake_token
          WEBHOOK_SECRET: test_secret
          WEBHOOK_URL: https://apimurojaat.bmb-holding.uz/api/telegram/webhook
          ADMIN_CHAT_ID: "123456"
          SECRET_KEY: test_secret_key_very_long_string_here
          ENCRYPTION_KEY: dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdA==
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short || echo "No tests yet"

  # ─── Lint & Build Frontend ────────────────────────────────────────────────
  lint-frontend:
    name: 🎨 Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install & Build check
        run: |
          cd frontend
          npm install
          npm run build

  # ─── Deploy Frontend → murojaat.bmb-holding.uz ───────────────────────────
  deploy-frontend:
    name: 📁 Deploy Frontend → murojaat.bmb-holding.uz
    runs-on: ubuntu-latest
    needs: lint-frontend
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          cd frontend
          npm install
          npm run build

      - name: Upload via FTP → murojaat.bmb-holding.uz
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: frontend/dist/
          server-dir: ${{ secrets.FTP_FRONTEND_DIR }}
          dangerous-clean-slate: false

  # ─── Deploy Backend → apimurojaat.bmb-holding.uz ─────────────────────────
  deploy-backend:
    name: 🐍 Deploy Backend → apimurojaat.bmb-holding.uz
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Upload backend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: backend/
          server-dir: ${{ secrets.FTP_BACKEND_DIR }}
          dangerous-clean-slate: false
          exclude: |
            **/.env
            **/__pycache__/**
            **/*.pyc
            **/.git/**
            **/tests/**

      - name: Trigger Passenger restart
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: .github/passenger-restart/
          server-dir: ${{ secrets.FTP_BACKEND_DIR }}tmp/
          dangerous-clean-slate: false

  # ─── Telegram Webhook ─────────────────────────────────────────────────────
  set-webhook:
    name: 🔗 Set Telegram Webhook
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Register webhook with Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          sleep 15

          RESPONSE=$(curl -s -X POST \
            "https://api.telegram.org/bot${BOT_TOKEN}/setWebhook" \
            -d "url=${WEBHOOK_URL}" \
            -d "secret_token=${WEBHOOK_SECRET}" \
            -d 'allowed_updates=["message","callback_query","edited_message","poll_answer","poll"]')

          echo "Javob: $RESPONSE"

          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "✅ Webhook o'rnatildi: $WEBHOOK_URL"
          else
            echo "⚠️  Webhook o'rnatishda muammo"
            echo "$RESPONSE"
            exit 1
          fi

  # ─── Notify on Failure ────────────────────────────────────────────────────
  notify-failure:
    name: 📢 Notify on Failure
    runs-on: ubuntu-latest
    needs: [test-backend, lint-frontend, deploy-frontend, deploy-backend]
    if: failure()
    steps:
      - name: Notify via Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=❌ CI/CD MUVAFFAQIYATSIZ!%0A%0ARepo: ${{ github.repository }}%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}" \
            -d "parse_mode=HTML"
