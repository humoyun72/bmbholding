# WARNING: Do NOT commit this file to git! (k8s/secrets.yaml is in .gitignore)
# Generate automatically: kubectl create secret generic integritybot-secrets \
#   --from-env-file=.env --dry-run=client -o yaml > k8s/secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: integritybot-secrets
  namespace: integritybot
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql+asyncpg://postgres:CHANGE_ME@db:5432/integritybot"
  POSTGRES_PASSWORD: "CHANGE_ME"

  # Redis
  REDIS_PASSWORD: "CHANGE_ME"

  # Telegram
  TELEGRAM_BOT_TOKEN: "CHANGE_ME"
  WEBHOOK_SECRET: "CHANGE_ME"
  WEBHOOK_URL: "https://your-domain.com/api/telegram/webhook"

  # Security
  SECRET_KEY: "CHANGE_ME_min_32_chars"
  ENCRYPTION_KEY: "CHANGE_ME_base64_32_bytes"
  ADMIN_DEFAULT_PASSWORD: "CHANGE_ME_strong_password"
  ALLOWED_ORIGINS: "https://your-domain.com"

  # Email (optional)
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  SMTP_FROM: ""

  # S3 (optional)
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_BUCKET_NAME: ""

  # Jira (optional)
  JIRA_URL: ""
  JIRA_TOKEN: ""

  # SIEM (optional)
  SIEM_URL: ""
  SIEM_TOKEN: ""
