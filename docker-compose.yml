# ================================================================
#  IntegrityBot — Docker Compose
#
#  ASOSIY (har doim):
#    docker-compose up -d
#    → db, redis, backend, frontend
#
#  QO'SHIMCHA SERVISLAR (kerak bo'lganda):
#    --profile monitoring  → Prometheus + Grafana
#    --profile production  → Nginx + ClamAV + DB-backup
#    --profile vault       → HashiCorp Vault
#    --profile siem        → Filebeat (log yig'ish)
#
#  Misol:
#    docker-compose --profile monitoring up -d
#    docker-compose --profile production --profile monitoring up -d
# ================================================================

services:

  # ════════════════════════════════════════════════════════════
  #  ASOSIY SERVISLAR — har doim ishlaydi
  # ════════════════════════════════════════════════════════════

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-integritybot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    command: >
      postgres
      -c wal_level=replica
      -c archive_mode=on
      -c archive_command='test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'
      -c archive_timeout=300
      -c max_wal_senders=3
      -c wal_keep_size=256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - wal_archive:/var/lib/postgresql/wal_archive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-integritybot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: integrity-bot-backend:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - internal
      - external

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    image: integrity-bot-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  # ════════════════════════════════════════════════════════════
  #  MONITORING — ixtiyoriy
  #  Yoqish: docker-compose --profile monitoring up -d
  #  Prometheus: http://localhost:9090
  #  Grafana:    http://localhost:3000  (admin / ${GRAFANA_PASSWORD})
  # ════════════════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - internal
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    networks:
      - internal
    profiles:
      - monitoring

  # ════════════════════════════════════════════════════════════
  #  PRODUCTION — nginx + antivirus + backup
  #  Yoqish: docker-compose --profile production up -d
  # ════════════════════════════════════════════════════════════

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal
      - external
    profiles:
      - production

  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    environment:
      CLAMAV_NO_FRESHCLAM: "false"
    volumes:
      - clamav_data:/var/lib/clamav
    networks:
      - internal
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 180s
    profiles:
      - production

  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-integritybot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    volumes:
      - db_backups:/backups
    networks:
      - internal
    profiles:
      - production

  # ════════════════════════════════════════════════════════════
  #  VAULT — secrets management
  #  Yoqish: docker-compose --profile vault up -d
  #  UI: http://localhost:8200  (token: ${VAULT_TOKEN})
  # ════════════════════════════════════════════════════════════

  vault:
    image: hashicorp/vault:1.17
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
    volumes:
      - vault_data:/vault/data
      - ./vault/config:/vault/config:ro
    ports:
      - "8200:8200"
    command: vault server -dev
    networks:
      - internal
    profiles:
      - vault

  # ════════════════════════════════════════════════════════════
  #  SIEM — log yig'ish (Elasticsearch / Splunk)
  #  Yoqish: docker-compose --profile siem up -d
  #  .env da ELASTICSEARCH_URL sozlang
  # ════════════════════════════════════════════════════════════

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.0
    restart: unless-stopped
    user: root
    command: filebeat -e -strict.perms=false
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - filebeat_data:/usr/share/filebeat/data
    environment:
      ELASTICSEARCH_ENABLED: ${ELASTICSEARCH_ENABLED:-false}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://localhost:9200}
      ELASTICSEARCH_TOKEN: ${ELASTICSEARCH_TOKEN:-}
      ELASTIC_USER: ${ELASTIC_USER:-}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-}
      ELASTIC_SSL_VERIFY: ${ELASTIC_SSL_VERIFY:-full}
    networks:
      - internal
    profiles:
      - siem

# ════════════════════════════════════════════════════════════
#  VOLUMES
# ════════════════════════════════════════════════════════════
volumes:
  postgres_data:
  wal_archive:
  redis_data:
  uploads_data:
  # Quyidagilar faqat tegishli profile ishlatilganda yaratiladi:
  db_backups:
  prometheus_data:
  grafana_data:
  clamav_data:
  vault_data:
  filebeat_data:

# ════════════════════════════════════════════════════════════
#  NETWORKS
# ════════════════════════════════════════════════════════════
networks:
  internal:
    driver: bridge
  external:
    driver: bridge
